name: Release Gate

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  workspace-startup-compat-node18:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.8
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node 18 workspace startup compatibility
        run: npm run check:workspace-startup-compat

  frontend-stable-windows:
    runs-on: windows-latest
    env:
      CI: "true"
      VITE_API_BASE: https://api.example.com
      VITE_WS_URL: wss://api.example.com/ws
      VITE_ENABLE_INTERNAL_ROUTES: "0"
      VITE_DEBUG_PUSH: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Report current verification status
        run: npm run verify:env:status

      - name: Validate frontend environment
        run: npm run validate:env -w ai-hq-frontend

      - name: Prepare frontend test result directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path ai-hq-frontend/test-results | Out-Null

      - name: Run frontend stable tests on Windows
        id: frontend_stable_windows
        run: npm run test:frontend:stable:ci

      - name: Inspect Windows frontend test outputs
        id: inspect_frontend_windows_outputs
        if: always()
        shell: pwsh
        run: |
          $contractsJunit = Test-Path "ai-hq-frontend/test-results/frontend-contracts.junit.xml"
          $smokeHooksJunit = Test-Path "ai-hq-frontend/test-results/frontend-smoke-hooks.junit.xml"
          $smokeUiJunitFiles = Get-ChildItem -Path "ai-hq-frontend/test-results" -Filter "frontend-smoke-ui-*.junit.xml" -ErrorAction SilentlyContinue
          $smokeUiJunit = @($smokeUiJunitFiles).Count -gt 0
          $contractsJson = Test-Path "ai-hq-frontend/test-results/frontend-contracts.json"
          $smokeHooksJson = Test-Path "ai-hq-frontend/test-results/frontend-smoke-hooks.json"
          $smokeUiJsonFiles = Get-ChildItem -Path "ai-hq-frontend/test-results" -Filter "frontend-smoke-ui-*.json" -ErrorAction SilentlyContinue
          $smokeUiJson = @($smokeUiJsonFiles).Count -gt 0
          "contracts_junit=$contractsJunit" >> $env:GITHUB_OUTPUT
          "smoke_hooks_junit=$smokeHooksJunit" >> $env:GITHUB_OUTPUT
          "smoke_ui_junit=$smokeUiJunit" >> $env:GITHUB_OUTPUT
          "contracts_json=$contractsJson" >> $env:GITHUB_OUTPUT
          "smoke_hooks_json=$smokeHooksJson" >> $env:GITHUB_OUTPUT
          "smoke_ui_json=$smokeUiJson" >> $env:GITHUB_OUTPUT
          $hasJunit = $contractsJunit -or $smokeHooksJunit -or $smokeUiJunit
          $hasJson = $contractsJson -or $smokeHooksJson -or $smokeUiJson
          "has_junit=$hasJunit" >> $env:GITHUB_OUTPUT
          "has_json=$hasJson" >> $env:GITHUB_OUTPUT

      - name: Upload Windows frontend test results
        id: upload_frontend_windows_results
        if: always() && (steps.inspect_frontend_windows_outputs.outputs.has_junit == 'true' || steps.inspect_frontend_windows_outputs.outputs.has_json == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-stable-windows-test-results
          path: ai-hq-frontend/test-results
          if-no-files-found: warn

      - name: Publish Windows frontend stable test report
        id: publish_frontend_windows_report
        if: always() && steps.inspect_frontend_windows_outputs.outputs.has_junit == 'true'
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "ai-hq-frontend/test-results/*.junit.xml"
          check_name: "Frontend Stable Tests (Windows)"
          require_tests: true
          detailed_summary: true
          include_passed: false
          annotate_only: false

      - name: Summarize Windows frontend stable results
        if: always()
        shell: pwsh
        run: |
          @"
          ## Frontend Stable Tests (Windows)

          | Item | Status |
          | --- | --- |
          | Stable test command | `${{ steps.frontend_stable_windows.outcome }}` |
          | JUnit publish step | `${{ steps.publish_frontend_windows_report.outcome }}` |
          | Artifact upload step | `${{ steps.upload_frontend_windows_results.outcome }}` |
          | Contracts JUnit file | `${{ steps.inspect_frontend_windows_outputs.outputs.contracts_junit }}` |
          | Smoke hooks JUnit file | `${{ steps.inspect_frontend_windows_outputs.outputs.smoke_hooks_junit }}` |
          | Smoke UI JUnit shards present | `${{ steps.inspect_frontend_windows_outputs.outputs.smoke_ui_junit }}` |
          | Contracts JSON file | `${{ steps.inspect_frontend_windows_outputs.outputs.contracts_json }}` |
          | Smoke hooks JSON file | `${{ steps.inspect_frontend_windows_outputs.outputs.smoke_hooks_json }}` |
          | Smoke UI JSON shards present | `${{ steps.inspect_frontend_windows_outputs.outputs.smoke_ui_json }}` |

          Checks:
          - `Frontend Stable Tests (Windows)` for file-level failures and test names

          Artifacts:
          - `frontend-stable-windows-test-results` for JUnit and JSON outputs

          Deeper inspection:
          - Open the Windows frontend check for direct failing test/file visibility
          - Download the Windows artifact if you need the raw JUnit or JSON payloads
          "@ >> $env:GITHUB_STEP_SUMMARY

  monorepo-release-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: aihq_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d aihq_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: "true"
      PORT: "8080"
      CORS_ORIGIN: https://app.example.com
      PUBLIC_BASE_URL: https://api.example.com
      DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/aihq_ci
      WS_AUTH_TOKEN: ci-ws-token
      OPENAI_API_KEY: ci-openai-key
      OPENAI_REALTIME_MODEL: gpt-4o-realtime-preview
      OPENAI_REALTIME_VOICE: alloy
      ADMIN_SESSION_SECRET: ci-admin-session-secret
      USER_SESSION_SECRET: ci-user-session-secret
      AIHQ_INTERNAL_TOKEN: ci-internal-token
      DEBUG_API_TOKEN: ci-debug-token
      CRON_SECRET: ci-cron-secret
      TENANT_SECRET_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      VAPID_PUBLIC_KEY: BElCiExamplePublicKey1234567890abcdefghijklmnop
      VAPID_PRIVATE_KEY: ci-vapid-private-key
      VAPID_SUBJECT: mailto:platform@example.com
      VERIFY_TOKEN: ci-meta-verify-token
      META_APP_ID: "123456789012345"
      META_APP_SECRET: ci-meta-app-secret
      META_REDIRECT_URI: https://api.example.com/oauth/meta/callback
      AIHQ_BASE_URL: https://aihq.example.com
      CONTACT_EMAIL: platform@example.com
      TWILIO_ACCOUNT_SID: TWILIO_ACCOUNT_SID_PLACEHOLDER
      TWILIO_API_KEY: TWILIO_API_KEY_PLACEHOLDER
      TWILIO_API_SECRET: TWILIO_API_SECRET_PLACEHOLDER
      TWILIO_TWIML_APP_SID: TWILIO_TWIML_APP_SID_PLACEHOLDER
      TWILIO_AUTH_TOKEN: TWILIO_AUTH_TOKEN_PLACEHOLDER
      TWILIO_CALLER_ID: TWILIO_CALLER_ID_PLACEHOLDER
      VITE_API_BASE: https://api.example.com
      VITE_WS_URL: wss://api.example.com/ws
      VITE_ENABLE_INTERNAL_ROUTES: "0"
      VITE_DEBUG_PUSH: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Report current verification status
        run: npm run verify:env:status

      - name: Validate environment
        run: npm run validate:env

      - name: Apply AI HQ migrations
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/aihq_ci
        run: npm run migrate:ai-hq-backend

      - name: Run AI HQ DB-backed integration harness against CI Postgres
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/aihq_ci
          AIHQ_DB_HARNESS_SKIP_MIGRATE: "1"
        run: npm run test:aihq:db

      - name: Check operational readiness
        run: npm run check:operational-readiness

      - name: Lint all workspaces
        run: npm run lint:all

      - name: Prepare frontend test result directory
        run: mkdir -p ai-hq-frontend/test-results

      - name: Run frontend stable tests on Linux
        id: frontend_stable_linux
        run: npm run test:frontend:stable:ci

      - name: Inspect Linux frontend test outputs
        id: inspect_frontend_linux_outputs
        if: always()
        shell: pwsh
        run: |
          $contractsJunit = Test-Path "ai-hq-frontend/test-results/frontend-contracts.junit.xml"
          $smokeHooksJunit = Test-Path "ai-hq-frontend/test-results/frontend-smoke-hooks.junit.xml"
          $smokeUiJunitFiles = Get-ChildItem -Path "ai-hq-frontend/test-results" -Filter "frontend-smoke-ui-*.junit.xml" -ErrorAction SilentlyContinue
          $smokeUiJunit = @($smokeUiJunitFiles).Count -gt 0
          $contractsJson = Test-Path "ai-hq-frontend/test-results/frontend-contracts.json"
          $smokeHooksJson = Test-Path "ai-hq-frontend/test-results/frontend-smoke-hooks.json"
          $smokeUiJsonFiles = Get-ChildItem -Path "ai-hq-frontend/test-results" -Filter "frontend-smoke-ui-*.json" -ErrorAction SilentlyContinue
          $smokeUiJson = @($smokeUiJsonFiles).Count -gt 0
          "contracts_junit=$contractsJunit" >> $env:GITHUB_OUTPUT
          "smoke_hooks_junit=$smokeHooksJunit" >> $env:GITHUB_OUTPUT
          "smoke_ui_junit=$smokeUiJunit" >> $env:GITHUB_OUTPUT
          "contracts_json=$contractsJson" >> $env:GITHUB_OUTPUT
          "smoke_hooks_json=$smokeHooksJson" >> $env:GITHUB_OUTPUT
          "smoke_ui_json=$smokeUiJson" >> $env:GITHUB_OUTPUT
          $hasJunit = $contractsJunit -or $smokeHooksJunit -or $smokeUiJunit
          $hasJson = $contractsJson -or $smokeHooksJson -or $smokeUiJson
          "has_junit=$hasJunit" >> $env:GITHUB_OUTPUT
          "has_json=$hasJson" >> $env:GITHUB_OUTPUT

      - name: Upload Linux frontend test results
        id: upload_frontend_linux_results
        if: always() && (steps.inspect_frontend_linux_outputs.outputs.has_junit == 'true' || steps.inspect_frontend_linux_outputs.outputs.has_json == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-stable-linux-test-results
          path: ai-hq-frontend/test-results
          if-no-files-found: warn

      - name: Publish Linux frontend stable test report
        id: publish_frontend_linux_report
        if: always() && steps.inspect_frontend_linux_outputs.outputs.has_junit == 'true'
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "ai-hq-frontend/test-results/*.junit.xml"
          check_name: "Frontend Stable Tests (Linux)"
          require_tests: true
          detailed_summary: true
          include_passed: false
          annotate_only: false

      - name: Summarize Linux frontend stable results
        if: always()
        shell: pwsh
        run: |
          @"
          ## Frontend Stable Tests (Linux)

          | Item | Status |
          | --- | --- |
          | Stable test command | `${{ steps.frontend_stable_linux.outcome }}` |
          | JUnit publish step | `${{ steps.publish_frontend_linux_report.outcome }}` |
          | Artifact upload step | `${{ steps.upload_frontend_linux_results.outcome }}` |
          | Contracts JUnit file | `${{ steps.inspect_frontend_linux_outputs.outputs.contracts_junit }}` |
          | Smoke hooks JUnit file | `${{ steps.inspect_frontend_linux_outputs.outputs.smoke_hooks_junit }}` |
          | Smoke UI JUnit shards present | `${{ steps.inspect_frontend_linux_outputs.outputs.smoke_ui_junit }}` |
          | Contracts JSON file | `${{ steps.inspect_frontend_linux_outputs.outputs.contracts_json }}` |
          | Smoke hooks JSON file | `${{ steps.inspect_frontend_linux_outputs.outputs.smoke_hooks_json }}` |
          | Smoke UI JSON shards present | `${{ steps.inspect_frontend_linux_outputs.outputs.smoke_ui_json }}` |

          Checks:
          - `Frontend Stable Tests (Linux)` for file-level failures and test names

          Artifacts:
          - `frontend-stable-linux-test-results` for JUnit and JSON outputs

          Deeper inspection:
          - Open the Linux frontend check for direct failing test/file visibility
          - Download the Linux artifact if you need the raw JUnit or JSON payloads
          "@ >> $env:GITHUB_STEP_SUMMARY

      - name: Run test gate
        run: npm run test:backend:all

      - name: Run build gate
        run: npm run build:all

  trigger-cloudflare-pages-deploy:
    runs-on: ubuntu-latest
    needs:
      - workspace-startup-compat-node18
      - monorepo-release-gate
      - frontend-stable-windows
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Trigger Cloudflare Pages production deploy
        id: trigger_pages_deploy
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
        run: |
          curl --fail --silent --show-error --request POST "$CLOUDFLARE_PAGES_DEPLOY_HOOK"

      - name: Run mandatory post-deploy verification
        id: postdeploy_verify
        env:
          AIHQ_BASE_URL: ${{ secrets.AIHQ_PROD_BASE_URL }}
          AIHQ_INTERNAL_TOKEN: ${{ secrets.AIHQ_PROD_INTERNAL_TOKEN }}
          META_BOT_BASE_URL: ${{ secrets.META_BOT_PROD_BASE_URL }}
          TWILIO_VOICE_BASE_URL: ${{ secrets.TWILIO_VOICE_PROD_BASE_URL }}
          POSTDEPLOY_TIMEOUT_MS: "12000"
          POSTDEPLOY_STRICT_SIDECARS: "0"
          POSTDEPLOY_FAIL_ON_DEGRADED: "1"
        shell: bash
        run: |
          if [ -z "$AIHQ_BASE_URL" ] || [ -z "$AIHQ_INTERNAL_TOKEN" ]; then
            echo "AIHQ_PROD_BASE_URL and AIHQ_PROD_INTERNAL_TOKEN are required for mandatory post-deploy verification." >&2
            exit 1
          fi

          npm run ops:postdeploy:verify

      - name: Run mandatory production prod-spine smoke
        id: prod_spine_smoke
        env:
          AIHQ_BASE_URL: ${{ secrets.AIHQ_PROD_BASE_URL }}
          AIHQ_INTERNAL_TOKEN: ${{ secrets.AIHQ_PROD_INTERNAL_TOKEN }}
          META_BOT_BASE_URL: ${{ secrets.META_BOT_PROD_BASE_URL }}
          TWILIO_VOICE_BASE_URL: ${{ secrets.TWILIO_VOICE_PROD_BASE_URL }}
          PROD_SPINE_SMOKE_ATTEMPTS: "8"
          PROD_SPINE_SMOKE_DELAY_MS: "15000"
          PROD_SPINE_TIMEOUT_MS: "12000"
          PROD_SPINE_STRICT_SIDECARS: "0"
          PROD_SPINE_FAIL_ON_DEGRADED: "1"
        shell: bash
        run: |
          if [ -z "$AIHQ_BASE_URL" ] || [ -z "$AIHQ_INTERNAL_TOKEN" ]; then
            echo "AIHQ_PROD_BASE_URL and AIHQ_PROD_INTERNAL_TOKEN are required for mandatory prod spine smoke." >&2
            exit 1
          fi

          npm run ops:prod-spine:smoke

      - name: Summarize post-deploy verification references
        if: always()
        shell: bash
        run: |
          {
            echo "## Post-deploy verification"
            echo
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| Deploy hook trigger | \`${{ steps.trigger_pages_deploy.outcome }}\` |"
            echo "| Post-deploy verify | \`${{ steps.postdeploy_verify.outcome }}\` |"
            echo "| Prod spine smoke step | \`${{ steps.prod_spine_smoke.outcome }}\` |"
            echo "| Strict sidecars | \`false\` |"
            echo "| Fail on degraded | \`true\` |"
            echo
            echo "Commands:"
            echo
            echo "- \`npm run ops:postdeploy:verify\`"
            echo "- \`npm run ops:prod-spine:smoke\`"
            echo "- \`npm run ops:postdeploy:full\`"
            echo
            echo "Runbooks:"
            echo
            echo "- \`docs/runbooks/environment-parity-verification.md\`"
            echo "- \`docs/runbooks/post-deploy-verification.md\`"
            echo "- \`docs/runbooks/schema-migration-safety.md\`"
            echo "- \`docs/runbooks/production-rollback.md\`"
          } >> "$GITHUB_STEP_SUMMARY"